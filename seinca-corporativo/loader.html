<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#08090b"><title>SEINCA</title><style>html,body{margin:0;background:#08090b;color:#fff;font-family:Arial,sans-serif}.loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}.loading b{display:block;font-size:28px;margin-bottom:8px}.loading span{color:#aeb3bc}</style></head><body><div class="loading"><div><b>SEINCA</b><span>Cargando presentación corporativa…</span></div></div><script>(async()=>{try{const files=['gz0.txt','gz1.txt','gz2.txt','r0.txt','r1.txt','r2.txt','r3.txt','r4.txt','r5.txt','r6.txt','r7.txt'];const parts=await Promise.all(files.map(f=>fetch('./data/'+f).then(r=>{if(!r.ok)throw Error(f);return r.text()})));const b=atob(parts.join('').trim()),u=Uint8Array.from(b,c=>c.charCodeAt(0));const s=new Blob([u]).stream().pipeThrough(new DecompressionStream('gzip'));const h=await new Response(s).text();document.open();document.write(h);document.close()}catch(e){document.body.innerHTML='<div class="loading"><div><b>SEINCA</b><span>No fue posible cargar la presentación. Actualice la página.</span></div></div>'}})();</script></body></html>
