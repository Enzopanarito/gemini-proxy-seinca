<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEINCA - Software de Licitaciones y APU</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #b91c1c; --secondary: #1e293b; --bg: #f1f5f9; --border: #cbd5e1; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; gap: 20px; color: #0f172a; }
        .panel-control { width: 50vw; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: 90vh; overflow-y: auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--secondary); text-transform: uppercase; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-ai { background: #6d28d9; } .btn-add { background: var(--primary); } .btn-pdf { background: #047857; }
        .apu-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 10px; }
        .apu-table th, .apu-table td { border: 1px solid var(--border); padding: 5px; }
        .num { text-align: right; }
        .panel-preview { flex-grow: 1; height: 90vh; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        #loading { display: none; text-align: center; color: #6d28d9; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="panel-control">
    <h3>1. Configuración de Obra</h3>
    <div class="grid-2">
        <input type="text" id="g_obra" placeholder="Nombre de la Obra" oninput="actualizarExpediente()">
        <input type="text" id="g_cliente" placeholder="Contratante" oninput="actualizarExpediente()">
    </div>
    
    <h3>2. Generador IA (Gemini 2.5)</h3>
    <textarea id="ia_desc" rows="3" placeholder="Describe la partida..."></textarea>
    <button class="btn-ai" onclick="analizarPartidaIA()">🤖 Generar APU (Conexión Directa v2.5)</button>
    <div id="loading">Consultando Gemini 2.5 Flash...</div>

    <h3>3. Editor APU</h3>
    <input type="text" id="apu_desc" placeholder="Descripción">
    <div class="grid-2">
        <input type="number" id="apu_rend" placeholder="Rendimiento" oninput="calcularAPU()">
        <input type="number" id="apu_fcas" placeholder="FCAS (%)" value="250" oninput="calcularAPU()">
    </div>
    <table class="apu-table" id="t_mat"><thead><tr><th>Mat</th><th>Cant</th><th>P.Unit</th></tr></thead><tbody></tbody></table>
    <div style="text-align:right;"><strong>Total: USD <span id="apu_total_final">0.00</span></strong></div>
    <button class="btn-add" onclick="guardarPartidaEnPresupuesto()">➕ Agregar al Presupuesto</button>
</div>

<div class="panel-preview">
    <button class="btn-pdf" onclick="exportarExpedientePDF()">📄 Exportar PDF</button>
    <div id="expediente-pdf" style="background:white; padding:20mm; width:210mm;">
        <h1 id="doc_obra_title">Proyecto</h1>
        <table id="doc_tabla_presupuesto" style="width:100%; border-collapse:collapse; border:1px solid #000;"></table>
    </div>
</div>

<script>
    let proyecto = { partidas: [] };

    async function analizarPartidaIA() {
        const desc = document.getElementById('ia_desc').value;
        if(!desc) return;
        document.getElementById('loading').style.display = 'block';
        
        try {
            const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyCVLtQRdraVLAMjPOnygxdxw3xLo735IR8', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "Actúa como Ingeniero. Analiza: " + desc + ". Devuelve JSON {covenin, unidad, cantidad, rendimiento, descripcion_tecnica, materiales: [{desc, cant, precio}]}" }] }] })
            });
            const data = await response.json();
            const ai = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json/g, '').replace(/```/g, ''));
            
            document.getElementById('apu_desc').value = ai.descripcion_tecnica;
            document.getElementById('apu_rend').value = ai.rendimiento;
            // Lógica de renderizado abreviada para brevedad
            alert("Partida cargada exitosamente.");
        } catch(e) { alert("Error IA: " + e.message); } finally { document.getElementById('loading').style.display = 'none'; }
    }

    function calcularAPU() { /* Lógica existente */ }
    function guardarPartidaEnPresupuesto() { 
        proyecto.partidas.push({ desc: document.getElementById('apu_desc').value, total: document.getElementById('apu_total_final').innerText });
        renderizarPresupuesto();
    }
    function renderizarPresupuesto() { document.getElementById('doc_tabla_presupuesto').innerHTML = proyecto.partidas.map(p => `<tr><td>${p.desc}</td><td>${p.total}</td></tr>`).join(''); }
    function exportarExpedientePDF() { html2pdf().from(document.getElementById('expediente-pdf')).save(); }
    function actualizarExpediente() { document.getElementById('doc_obra_title').innerText = document.getElementById('g_obra').value; }
</script>

</body>
</html>
