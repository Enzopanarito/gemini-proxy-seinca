<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="theme-color" content="#111111">
<title>SEINCA | Documento PDF</title>
<link rel="stylesheet" href="/onix-512/pdf-viewer.css?v=20260715-1">
</head>
<body>
<main id="viewer-shell" aria-live="polite">
<div class="loading" id="loading"><span></span><p>Cargando documento completo…</p></div>
<iframe id="pdf-frame" title="Documento PDF completo" allow="fullscreen" referrerpolicy="strict-origin-when-cross-origin"></iframe>
<section class="error" id="viewer-error" hidden>
<h1>No fue posible abrir el documento.</h1>
<p>Regresa a la presentación e inténtalo nuevamente.</p>
<button type="button" id="back-button">Volver</button>
</section>
</main>
<script src="/onix-512/pdf-viewer.js?v=20260715-1"></script>
</body>
</html>
