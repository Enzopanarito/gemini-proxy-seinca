name: Validar SEINCA Enterprise

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund
      - name: Validar sintaxis, arquitectura y DOM
        run: npm run check
      - name: Ejecutar pruebas del motor de costos
        run: npm test
