name: Build Onix 512 static presentation

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/onix-static.yml'

permissions:
  contents: write

jobs:
  build-static-portal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download approved self-contained source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .onix-build onix-512
          URL="https://drive.google.com/uc?export=download&id=11AoBHcqXFeZXt9YYp7L6AD3YZF8fLUNu&confirm=t&v=20260714164645"
          curl -L --fail --retry 6 --retry-delay 3 --retry-all-errors \
            -A "Mozilla/5.0 SEINCA-Onix-Static-Builder/1.0" \
            "$URL" -o .onix-build/source.html
          test "$(wc -c < .onix-build/source.html)" -gt 250000
          grep -q "ONIX-V12-VERCEL-IMPORT-SELF-CONTAINED-20260714" .onix-build/source.html

      - name: Convert source into CSP-safe static files
        shell: python
        run: |
          from pathlib import Path
          import json
          import re

          source_path = Path('.onix-build/source.html')
          out_dir = Path('onix-512')
          source = source_path.read_text(encoding='utf-8')

          styles = re.findall(r'<style\b[^>]*>([\s\S]*?)</style>', source, flags=re.I)
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)</script>', source, flags=re.I)
          if len(styles) < 1:
              raise SystemExit('No se encontraron estilos en la fuente aprobada')
          if len(scripts) < 1:
              raise SystemExit('No se encontró el control JavaScript en la fuente aprobada')
          if source.count('data:image') < 9:
              raise SystemExit('La fuente no contiene las nueve imágenes integradas')

          html = re.sub(r'<style\b[^>]*>[\s\S]*?</style>', '', source, flags=re.I)
          html = re.sub(r'<script(?![^>]*\bsrc=)[^>]*>[\s\S]*?</script>', '', html, flags=re.I)
          html = html.replace(
              '</head>',
              '<link rel="stylesheet" href="/onix-512/style.css?v=20260714">'
              '<meta name="seinca-static-release" content="ONIX-V14-STATIC-CDN-20260714">'
              '</head>',
              1,
          )
          html = html.replace(
              '</body>',
              '<script src="/onix-512/portal-inline.js?v=20260714" defer></script></body>',
              1,
          )

          css = '\n\n'.join(styles).strip() + '\n'
          js = '\n\n'.join(scripts).strip() + '\n'
          js += "\nwindow.addEventListener('load',()=>{const imgs=[...document.images];const failed=imgs.filter(i=>!i.complete||i.naturalWidth<2);console.info('SEINCA_ONIX_STATIC_HEALTH',{release:'ONIX-V14-STATIC-CDN-20260714',images:imgs.length,failedImages:failed.length,openButtons:document.querySelectorAll('.seinca-open').length,downloadButtons:document.querySelectorAll('.seinca-download').length});if(failed.length){const n=document.createElement('div');n.className='asset-error';n.textContent='Aviso técnico: no se pudo cargar un recurso visual. Use el respaldo offline.';document.body.appendChild(n);}});\n"
          css += "\n.asset-error{position:fixed;left:16px;right:16px;bottom:16px;z-index:9999;background:#8b0000;color:#fff;padding:14px 18px;border-radius:5px;font:700 13px Arial;box-shadow:0 8px 30px #0005}\n"

          out_dir.mkdir(parents=True, exist_ok=True)
          (out_dir / 'index.html').write_text(html, encoding='utf-8')
          (out_dir / 'style.css').write_text(css, encoding='utf-8')
          (out_dir / 'portal-inline.js').write_text(js, encoding='utf-8')

          config_path = Path('vercel.json')
          config = json.loads(config_path.read_text(encoding='utf-8'))
          rewrites = [r for r in config.get('rewrites', []) if r.get('source') not in {'/onix-512', '/onix-512/'}]
          rewrites.extend([
              {'source': '/onix-512', 'destination': '/onix-512/index.html'},
              {'source': '/onix-512/', 'destination': '/onix-512/index.html'},
          ])
          config['rewrites'] = rewrites
          config_path.write_text(json.dumps(config, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          if 'ONIX-V14-STATIC-CDN-20260714' not in html:
              raise SystemExit('No se insertó la marca de revisión')
          if len(re.findall(r'class="seinca-open"', html)) != 13:
              raise SystemExit('Cantidad incorrecta de botones Abrir')
          if len(re.findall(r'class="seinca-download"', html)) != 13:
              raise SystemExit('Cantidad incorrecta de botones Descargar')

      - name: Commit generated static release
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SEINCA Release Bot"
          git config user.email "enzopanarito@gmail.com"
          git add onix-512/index.html onix-512/style.css onix-512/portal-inline.js vercel.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "release(onix): publish V14 static CDN presentation"
          git push
