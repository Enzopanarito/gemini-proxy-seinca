name: Diagnosticar recursos Onix 512 V14

on:
  pull_request:
    branches:
      - mejoras-onix-512-v16-executive-2026-07-14
    paths:
      - .github/workflows/onix-v16-media-pr.yml

permissions:
  contents: read

jobs:
  listar-recursos:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar V14 exacta
        uses: actions/checkout@v4
        with:
          ref: bd5544bbbfe2fe79a258c2c8c1356caad91037df
      - name: Mostrar estructura real
        run: |
          echo '--- ARCHIVOS ONIX 512 ---'
          find onix-512 -maxdepth 4 -type f -printf '%p | %s bytes\n' | sort
          echo '--- FIN ---'
