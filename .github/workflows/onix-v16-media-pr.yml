name: Guardar inventario Onix 512 V14

on:
  pull_request:
    branches:
      - mejoras-onix-512-v16-executive-2026-07-14
    paths:
      - .github/workflows/onix-v16-media-pr.yml

permissions:
  contents: write

jobs:
  inventario:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar rama de diagnóstico
        uses: actions/checkout@v4
        with:
          ref: test-onix-v16-video-workflow
          fetch-depth: 0
      - name: Crear inventario exacto de V14
        run: |
          git fetch origin bd5544bbbfe2fe79a258c2c8c1356caad91037df
          git ls-tree -r --long bd5544bbbfe2fe79a258c2c8c1356caad91037df onix-512 > V14_ONIX_FILE_LIST.txt
          cat V14_ONIX_FILE_LIST.txt
      - name: Guardar inventario
        run: |
          git config user.name 'SEINCA Diagnostic Bot'
          git config user.email 'enzopanarito@gmail.com'
          git add V14_ONIX_FILE_LIST.txt
          git commit -m 'diagnostic(onix-v16): save exact V14 file inventory' || exit 0
          git push origin HEAD:test-onix-v16-video-workflow
