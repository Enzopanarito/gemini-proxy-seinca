name: QA Grounded Caracas v6

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe-live:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Consultar APU investigado y mostrar diagnóstico
        shell: bash
        run: |
          cat > /tmp/request.json <<'JSON'
          {
            "prompt": "Suministro y aplicación de pintura de caucho blanca de primera calidad en paredes interiores, dos manos, sobre 40 m2 de superficie previamente preparada, incluyendo sellador, resane menor, protección y limpieza final.",
            "provider": "AUTO",
            "tipoCliente": "PRIVADO",
            "altura": 0,
            "config": {"currency":"USD","workdayHours":8,"defaultFcasPct":250,"requireVerifiedPricesForApproval":true},
            "catalog": []
          }
          JSON
          set +e
          code=$(curl --silent --show-error --location --max-time 59 -H 'Content-Type: application/json' --data @/tmp/request.json -o /tmp/apu.json -w '%{http_code}' https://gemini-proxy-seinca.vercel.app/api/gemini)
          status=$?
          echo "CURL_STATUS=$status HTTP_STATUS=$code"
          cat /tmp/apu.json 2>/dev/null || true
          echo
          exit 0
