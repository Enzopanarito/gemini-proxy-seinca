name: Generar medios ejecutivos Onix 512 V16

on:
  push:
    branches:
      - mejoras-onix-512-v16-executive-2026-07-14
    paths:
      - .github/workflows/onix-v16-media.yml

permissions:
  contents: write

jobs:
  generar-medios:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Descargar rama V16
        uses: actions/checkout@v4
        with:
          ref: mejoras-onix-512-v16-executive-2026-07-14
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar motor neural
        run: pip install edge-tts==7.2.8

      - name: Generar narración aprobada
        run: |
          mkdir -p onix-512/media
          python - <<'PY'
          import asyncio
          import edge_tts

          texto = (
              "En SEINCA entendemos que una buena obra comienza mucho antes de la construcción. "
              "Comienza con una idea clara, información confiable y decisiones tomadas en el momento correcto. "
              "Hoy presentamos Onix quinientos doce: una propuesta integral para transformar el área exterior "
              "de la residencia de la Familia Rivas en un espacio contemporáneo, funcional y cuidadosamente ejecutado. "
              "La solución articula el área social cubierta, la parrillera, las superficies, el paisajismo y la iluminación "
              "como un solo conjunto arquitectónico. Cada elemento fue concebido para aportar confort, durabilidad "
              "y una experiencia de uso coherente durante el día y la noche. "
              "El proyecto reúne diseño arquitectónico, ingeniería, planificación y control técnico. "
              "La documentación conecta la intención visual con la manera real de construirla, medirla, presupuestarla y aprobarla. "
              "El presupuesto está organizado en cuarenta y ocho partidas, respaldadas por análisis de precios unitarios "
              "y cómputos métricos trazables. El expediente incorpora memoria descriptiva, informe técnico, planos, "
              "selección de acabados y documentos de aceptación. "
              "La ejecución se planifica en un plazo estimado de diez a doce semanas. La secuencia comprende validación y procura, "
              "demoliciones y fundaciones, fabricación y montaje estructural, cubierta e instalaciones, superficies y acabados, "
              "pruebas y entrega. "
              "Antes de iniciar se deben cerrar decisiones clave: acabados y materiales; medidas, niveles y condiciones reales; "
              "ingeniería de detalle y planos de taller; equipos y requerimientos eléctricos; fecha de inicio y condiciones comerciales. "
              "La inversión total de la propuesta es de cuarenta y cinco mil novecientos diecisiete dólares con ocho centavos, IVA incluido. "
              "Onix quinientos doce no es solamente una imagen atractiva. Es una propuesta técnicamente organizada, "
              "económicamente trazable y preparada para avanzar hacia contratación y ejecución. "
              "SEINCA. Ingeniería, control y calidad para llevar el proyecto del concepto a la realidad."
          )

          async def main():
              voz = edge_tts.Communicate(
                  texto,
                  "es-VE-SebastianNeural",
                  rate="-8%",
                  pitch="-2Hz",
                  volume="+0%",
              )
              await voz.save("onix-512/media/SEINCA_Onix_512_Narracion_Completa_V16.mp3")

          asyncio.run(main())
          PY

      - name: Preparar secuencia visual
        run: |
          ROOT="$GITHUB_WORKSPACE/onix-512"
          cat > "$ROOT/media/slides-v16.txt" <<EOF
          file '$ROOT/assets/hero.webp'
          duration 24
          file '$ROOT/assets/render.webp'
          duration 24
          file '$ROOT/assets/planta.webp'
          duration 24
          file '$ROOT/assets/techo.webp'
          duration 24
          file '$ROOT/assets/luces.webp'
          duration 24
          file '$ROOT/assets/hero.webp'
          duration 40
          file '$ROOT/assets/hero.webp'
          EOF
          ffmpeg -y -i "$ROOT/assets/hero.webp" -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080" -frames:v 1 -q:v 2 "$ROOT/media/SEINCA_Onix_512_V16_Poster.jpg"

      - name: Renderizar video narrado Full HD
        run: |
          ROOT="$GITHUB_WORKSPACE/onix-512"
          ffmpeg -y -f concat -safe 0 -i "$ROOT/media/slides-v16.txt" \
            -i "$ROOT/media/SEINCA_Onix_512_Narracion_Completa_V16.mp3" \
            -i "$ROOT/media/SEINCA_Onix_512_Subtitulos_V16.vtt" \
            -map 0:v:0 -map 1:a:0 -map 2:0 \
            -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,format=yuv420p" \
            -r 30 -c:v libx264 -preset slow -b:v 850k -maxrate 950k -bufsize 1900k \
            -c:a aac -b:a 96k -c:s mov_text -metadata:s:s:0 language=spa \
            -shortest -movflags +faststart \
            "$ROOT/media/SEINCA_Onix_512_V16_Presentacion_Narrada.mp4"

      - name: Renderizar video sin voz
        run: |
          ROOT="$GITHUB_WORKSPACE/onix-512"
          DURACION=$(ffprobe -v error -show_entries format=duration -of default=nw=1:nk=1 "$ROOT/media/SEINCA_Onix_512_Narracion_Completa_V16.mp3")
          ffmpeg -y -f concat -safe 0 -i "$ROOT/media/slides-v16.txt" \
            -vf "scale=1920:1080:force_original_aspect_ratio=increase,crop=1920:1080,format=yuv420p" \
            -r 30 -c:v libx264 -preset slow -b:v 850k -maxrate 950k -bufsize 1900k \
            -t "$DURACION" -an -movflags +faststart \
            "$ROOT/media/SEINCA_Onix_512_V16_Presentacion_Sin_Voz.mp4"

      - name: Renderizar versión para WhatsApp
        run: |
          ROOT="$GITHUB_WORKSPACE/onix-512"
          ffmpeg -y -f concat -safe 0 -i "$ROOT/media/slides-v16.txt" \
            -i "$ROOT/media/SEINCA_Onix_512_Narracion_Completa_V16.mp3" \
            -map 0:v:0 -map 1:a:0 \
            -vf "scale=1280:720:force_original_aspect_ratio=increase,crop=1280:720,format=yuv420p" \
            -r 25 -c:v libx264 -preset slow -b:v 520k -maxrate 620k -bufsize 1240k \
            -c:a aac -b:a 80k -shortest -movflags +faststart \
            "$ROOT/media/SEINCA_Onix_512_V16_WhatsApp.mp4"

      - name: Verificar medios
        run: |
          ROOT="$GITHUB_WORKSPACE/onix-512/media"
          rm -f "$ROOT/slides-v16.txt"
          for archivo in \
            SEINCA_Onix_512_Narracion_Completa_V16.mp3 \
            SEINCA_Onix_512_V16_Presentacion_Narrada.mp4 \
            SEINCA_Onix_512_V16_Presentacion_Sin_Voz.mp4 \
            SEINCA_Onix_512_V16_WhatsApp.mp4 \
            SEINCA_Onix_512_V16_Poster.jpg; do
            test -s "$ROOT/$archivo"
            echo "$archivo: $(du -h "$ROOT/$archivo" | cut -f1)"
          done
          find "$ROOT" -type f -size +24M -print -quit | grep -q . && { echo "Hay un archivo mayor de 24 MB"; exit 1; } || true

      - name: Guardar medios en la rama Preview
        run: |
          git config user.name "SEINCA Media Preview Bot"
          git config user.email "enzopanarito@gmail.com"
          git add onix-512/media/SEINCA_Onix_512_Narracion_Completa_V16.mp3
          git add onix-512/media/SEINCA_Onix_512_V16_Presentacion_Narrada.mp4
          git add onix-512/media/SEINCA_Onix_512_V16_Presentacion_Sin_Voz.mp4
          git add onix-512/media/SEINCA_Onix_512_V16_WhatsApp.mp4
          git add onix-512/media/SEINCA_Onix_512_V16_Poster.jpg
          git commit -m "asset(onix-v16): add approved narration and preview videos" || exit 0
          git push origin HEAD:mejoras-onix-512-v16-executive-2026-07-14
