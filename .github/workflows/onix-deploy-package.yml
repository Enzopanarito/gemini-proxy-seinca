name: ONIX deploy package

on:
  pull_request:
    branches: [main]
    paths:
      - 'onix-512/**'
      - 'api/onix-media.js'
      - '.github/workflows/onix-deploy-package.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build isolated ONIX package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p deploy/onix-512 deploy/api
          cp onix-512/index.html deploy/index.html
          cp onix-512/index.html deploy/onix-512/index.html
          cp onix-512/cinematic.css deploy/onix-512/cinematic.css
          cp onix-512/cinematic-v17.css deploy/onix-512/cinematic-v17.css
          cp onix-512/cinematic.js deploy/onix-512/cinematic.js
          cp api/onix-media.js deploy/api/onix-media.js
          cat > deploy/vercel.json <<'JSON'
          {
            "functions": {
              "api/onix-media.js": { "maxDuration": 60 }
            },
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "X-Content-Type-Options", "value": "nosniff" },
                  { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" },
                  { "key": "Permissions-Policy", "value": "camera=(), microphone=(), geolocation=(), payment=()" },
                  { "key": "Cross-Origin-Opener-Policy", "value": "same-origin" }
                ]
              }
            ]
          }
          JSON
          node --check deploy/onix-512/cinematic.js
          test -s deploy/index.html
          test -s deploy/onix-512/cinematic.css
          test -s deploy/onix-512/cinematic-v17.css
          test -s deploy/api/onix-media.js
      - uses: actions/upload-artifact@v4
        with:
          name: seinca-onix-512-deploy
          path: deploy
          if-no-files-found: error
          retention-days: 1
