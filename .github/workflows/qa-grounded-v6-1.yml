name: QA Grounded Caracas v6.1

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  grounded-live:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - name: QA estático y unitario
        run: npm run qa
      - name: Verificar motor publicado
        run: |
          curl --fail --silent --show-error --location --max-time 20 https://gemini-proxy-seinca.vercel.app/api/gemini -o /tmp/engine.json
          cat /tmp/engine.json
          node -e "const d=require('/tmp/engine.json'); if(!d.ok||d.version!=='6.0.1-grounded-caracas'||!String(d.location).includes('Caracas')) throw new Error(JSON.stringify(d));"
      - name: Generar APU real investigado
        run: |
          cat > /tmp/request.json <<'JSON'
          {
            "prompt": "Suministro y aplicación de pintura de caucho blanca de primera calidad en paredes interiores, dos manos, sobre 40 m2 de superficie previamente preparada, incluyendo sellador, resane menor, protección y limpieza final.",
            "provider": "AUTO",
            "tipoCliente": "PRIVADO",
            "altura": 0,
            "config": {"currency":"USD","workdayHours":8,"defaultFcasPct":250,"requireVerifiedPricesForApproval":true},
            "catalog": []
          }
          JSON
          code=$(curl --silent --show-error --location --max-time 59 -H 'Content-Type: application/json' --data @/tmp/request.json -o /tmp/apu.json -w '%{http_code}' https://gemini-proxy-seinca.vercel.app/api/gemini)
          cat /tmp/apu.json
          echo
          test "$code" = "200"
          node <<'NODE'
          const d=require('/tmp/apu.json');
          if(!d.ok) throw new Error(d.detalle||d.error||'falló');
          if(!String(d.modelo).includes('investigación web Caracas')) throw new Error('no declaró investigación web');
          const resources=[...(d.data.materiales||[]),...(d.data.equipos||[]),...(d.data.mo||[])];
          const priced=resources.filter(r=>(r.precio||r.tarifa||r.jornal)>0);
          if(!resources.length||!priced.length) throw new Error('sin recursos o precios web');
          if(!(d.motor?.fuentes?.length>0)) throw new Error('sin fuentes citadas');
          for(const r of priced) if(!String(r.fuente_precio||'').includes('http')) throw new Error('precio sin URL');
          if(!d.data.criterio_covenin) throw new Error('sin investigación normativa');
          console.log('GROUNDED_PRODUCTION_OK', JSON.stringify({modelo:d.modelo,cobertura:d.motor.cobertura,fuentes:d.motor.fuentes.length,covenin:d.data.covenin}));
          NODE
