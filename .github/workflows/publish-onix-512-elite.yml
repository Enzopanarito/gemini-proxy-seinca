name: Publish Onix 512 Elite Review

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-onix-512-elite.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch verified V16 preview branch
        run: git fetch origin preview-onix-512-v16-clean-2026-07-14

      - name: Copy V16 into isolated public route
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/onix-v16 onix-512-elite
          mkdir -p /tmp/onix-v16
          git archive origin/preview-onix-512-v16-clean-2026-07-14 onix-512 | tar -x -C /tmp/onix-v16
          cp -a /tmp/onix-v16/onix-512 onix-512-elite

          # The logo must always be the official verified production asset.
          test -f onix-512/logo-seinca.png
          cp onix-512/logo-seinca.png onix-512-elite/logo-seinca.png
          find onix-512-elite -type f \( -name '*.html' -o -name '*.css' -o -name '*.js' \) -print0 | \
            xargs -0 sed -i 's/logo-seinca\.svg/logo-seinca.png/g'

          # Mark this build as a public review without touching the approved V14 route.
          python3 - <<'PY'
          from pathlib import Path
          p = Path('onix-512-elite/index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('ONIX-512-V16-EXECUTIVE-PREVIEW-20260714', 'ONIX-512-V16-ELITE-PUBLIC-REVIEW-20260714')
          s = s.replace('V16 PREVIEW', 'V16 ÉLITE · VISTA PREVIA')
          p.write_text(s, encoding='utf-8')
          PY

      - name: Add clean public route without changing V14
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          path = Path('vercel.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          rewrites = data.setdefault('rewrites', [])
          wanted = [
              {'source': '/onix-512-elite', 'destination': '/onix-512-elite/index.html'},
              {'source': '/onix-512-elite/', 'destination': '/onix-512-elite/index.html'},
          ]
          existing = {(r.get('source'), r.get('destination')) for r in rewrites}
          for rule in wanted:
              if (rule['source'], rule['destination']) not in existing:
                  rewrites.append(rule)
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Validate required files and links
        shell: bash
        run: |
          set -euo pipefail
          required=(
            onix-512-elite/index.html
            onix-512-elite/v16-1.css
            onix-512-elite/v16-2.css
            onix-512-elite/v16-3.css
            onix-512-elite/v16.js
            onix-512-elite/logo-seinca.png
            onix-512-elite/assets/hero.webp
            onix-512-elite/assets/render.webp
            onix-512-elite/assets/planta.webp
            onix-512-elite/assets/luces.webp
            onix-512-elite/assets/techo.webp
            onix-512-elite/media/SEINCA_Onix_512_Narracion_Completa_V16.mp3
          )
          for f in "${required[@]}"; do test -s "$f" || { echo "Missing: $f"; exit 1; }; done
          grep -q 'logo-seinca.png' onix-512-elite/index.html
          ! grep -q 'logo-seinca.svg' onix-512-elite/index.html
          test "$(find onix-512-elite/documents -type f -name '*.pdf' | wc -l | tr -d ' ')" -eq 13

      - name: Commit public review route
        shell: bash
        run: |
          git config user.name 'SEINCA Release Bot'
          git config user.email 'enzopanarito@gmail.com'
          git add onix-512-elite vercel.json
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'feat(onix): publish public V16 elite review route'
            git push origin main
          fi
